apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: python-app-qa
  namespace: default
spec:
  interval: 5m
  install:
    createNamespace: true
  chart:
    spec:
      chart: python-app-chart
      sourceRef:
        kind: GitRepository
        name: main-repo
        namespace: flux-system
      interval: 1m
  values:
    image:
      repository: nginx
      tag: latest
    replicaCount: 1
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    resources:
      requests:
        cpu: 256m
        memory: 512Mi
      limits:
        cpu: 512m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: "topology.kubernetes.io/zone"
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: python-app-chart
      - maxSkew: 1
        topologyKey: "kubernetes.io/hostname"
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: python-app-chart
    env:
      - name: APP_ENV
        value: "QA"
