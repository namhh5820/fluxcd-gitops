---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: python-app-1
  namespace: flux-system
spec:
  chart:
    spec:
      chart: ./python-app-chart
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: k-helm-charts
        namespace: flux-system
  interval: 5m0s
  values:
    image:
      repository: nginx
      tag: latest
    replicaCount: 1
