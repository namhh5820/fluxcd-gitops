apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: python-app-qa
  namespace: python-app-qa
spec:
  interval: 5m
  install:
    createNamespace: true
  chart:
    spec:
      chart: python-app-chart
      sourceRef:
        kind: GitRepository
        name: k-helm-charts
        namespace: flux-system
      interval: 1m
  values:
    image:
      repository: nginx
      tag: latest
    replicaCount: 2
    resources:
      requests:
        cpu: 256m
        memory: 512Mi
      limits:
        cpu: 512m
        memory: 1Gi
    env:
      - name: APP_ENV
        value: "QA"