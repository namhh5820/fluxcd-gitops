---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: default
spec:
  chart:
    spec:
      chart: ./charts/podinfo
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: helm-podinfo
        namespace: flux-system
  interval: 30s
  values:
    replicaCount: 2
    image:
      repository: "ghcr.io/stefanprodan/podinfo"
      tag: "6.0.0"
    resoureces:
      limits:
        cpu: 1
        memory: 128Mi
      requests: 
        cpu: 100m
        memory: 64Mi
