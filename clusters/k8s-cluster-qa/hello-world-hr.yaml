---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hello-world
  namespace: default
spec:
  chart:
    spec:
      chart: ./charts/hello-world
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: helm-github-io
        namespace: flux-system
  interval: 5m0s
  values:
    replicaCount: 2
    image:
      repository: "nginx"
      tag: "1.30"
